name: Sync Upstream and Deploy Worker

permissions:
  contents: write

env:
  UPSTREAM_REPO: huangxd-/danmu_api
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main

on:
  schedule:
    # 每天北京时间 08:20 自动检查一次上游更新
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  sync-and-deploy:
    name: Sync upstream, keep custom Cloudflare link, deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || true
          git fetch upstream "${UPSTREAM_BRANCH}" --tags --prune

      - name: Merge upstream into fork
        id: sync
        run: |
          set -euo pipefail
          git checkout "${TARGET_BRANCH}"
          BEFORE_SHA="$(git rev-parse HEAD)"
          echo "before_sha=${BEFORE_SHA}" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "upstream/${UPSTREAM_BRANCH}" HEAD; then
            echo "already_up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 保留你的 fork 上的 README 个性化 Cloudflare 一键部署链接，同时合并上游代码更新。
          if ! git merge --no-edit "upstream/${UPSTREAM_BRANCH}"; then
            echo "::error::上游同步产生冲突，需要手动处理。"
            git status --short
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          p = Path('README.md')
          if p.exists():
              text = p.read_text(encoding='utf-8')
              text = text.replace(
                  'https://deploy.workers.cloudflare.com/?url=https://github.com/huangxd-/danmu_api',
                  'https://deploy.workers.cloudflare.com/?url=https://github.com/fox37x/danmu_api',
              )
              p.write_text(text, encoding='utf-8')
          PY

          if ! git diff --quiet; then
            git add README.md
            git commit --amend --no-edit
          fi

          AFTER_SHA="$(git rev-parse HEAD)"
          echo "after_sha=${AFTER_SHA}" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push synced branch
        if: steps.sync.outputs.changed == 'true'
        env:
          SYNC_GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${SYNC_GITHUB_TOKEN:-}" ]; then
            git remote set-url origin "https://x-access-token:${SYNC_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "${TARGET_BRANCH}"

      - name: Deploy to Cloudflare Workers when repo secrets exist
        if: steps.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "仓库已同步并推送。"
            echo "未配置 GitHub Secret: CLOUDFLARE_API_TOKEN，所以本 workflow 不直接执行 wrangler deploy。"
            echo "如果 Cloudflare Workers 已绑定此 GitHub 仓库，Cloudflare 会在 main 更新后自行部署。"
            exit 0
          fi
          npm install
          npx wrangler deploy
